name: Dependabot Auto-Merge

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: Evaluate eligible PRs without merging
        required: true
        type: boolean
        default: true

permissions:
  contents: write
  checks: read
  pull-requests: write

jobs:
  auto-merge:
    name: Merge verified Dependabot PRs
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate and squash-merge eligible PRs
        actions/github-script@373c709c69115d41ff229c7e5df9f8788daa9553 # v9
        with:
          script: |
            const DEPENDABOT_LOGIN = "dependabot[bot]";
            const REQUIRED_CHECKS = [
              "Build",
              "Lint",
              "Security Audit",
              "Test on Node.js 20.x",
              "Test on Node.js 22.x"
            ];
            const REQUIRED_LABELS = ["dependencies"];
            const ALLOWED_PATHS = [
              /^\.github\/workflows\/[^/]+\.ya?ml$/,
              /(^|\/)(package\.json|package-lock\.json|npm-shrinkwrap\.json|pnpm-lock\.yaml|yarn\.lock|bun\.lockb?)$/,
              /(^|\/)(pyproject\.toml|poetry\.lock|uv\.lock|Pipfile(\.lock)?|setup\.py|setup\.cfg|requirements[^/]*\.txt)$/,
            ];
            const { owner, repo } = context.repo;
            const dryRun =
              context.eventName === "workflow_dispatch" &&
              String(context.payload.inputs?.dry_run).toLowerCase() !== "false";

            const latestGitHubActionsChecks = async (ref) => {
              const response = await github.rest.checks.listForRef({
                owner,
                repo,
                ref,
                per_page: 100,
              });
              const checks = new Map();
              for (const run of response.data.check_runs) {
                if (run.app?.slug !== "github-actions") continue;
                const previous = checks.get(run.name);
                if (
                  !previous ||
                  new Date(run.completed_at || 0) > new Date(previous.completed_at || 0)
                ) {
                  checks.set(run.name, run);
                }
              }
              return checks;
            };

            const verifyProvenance = async (pr) => {
              if (
                pr.user?.login?.toLowerCase() !== DEPENDABOT_LOGIN ||
                pr.user?.type !== "Bot"
              ) {
                throw new Error("PR is not authored by the Dependabot GitHub App.");
              }

              const labels = new Set((pr.labels || []).map((label) => label.name));
              const missingLabels = REQUIRED_LABELS.filter(
                (label) => !labels.has(label)
              );
              if (missingLabels.length) {
                throw new Error(
                  "Missing required labels: " + missingLabels.join(", ")
                );
              }

              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner,
                repo,
                pull_number: pr.number,
                per_page: 100,
              });
              const disallowedPaths = files
                .map((file) => file.filename)
                .filter((path) => !ALLOWED_PATHS.some((pattern) => pattern.test(path)));
              if (disallowedPaths.length) {
                throw new Error(
                  "Dependabot PR changed non-dependency paths: " +
                    disallowedPaths.join(", ")
                );
              }

              const commits = await github.paginate(github.rest.pulls.listCommits, {
                owner,
                repo,
                pull_number: pr.number,
                per_page: 100,
              });
              if (
                commits.some(
                  (commit) => commit.author?.login?.toLowerCase() !== DEPENDABOT_LOGIN
                )
              ) {
                throw new Error(
                  "Every commit must be authored by dependabot[bot] for automatic merging."
                );
              }

              const reviews = await github.paginate(github.rest.pulls.listReviews, {
                owner,
                repo,
                pull_number: pr.number,
                per_page: 100,
              });
              const humanChangesRequested = reviews.some((review) => {
                const login = review.user?.login?.toLowerCase() || "";
                const automated = review.user?.type === "Bot" || login.endsWith("[bot]");
                return !automated && review.state === "CHANGES_REQUESTED";
              });
              if (humanChangesRequested) {
                throw new Error("A human reviewer requested changes.");
              }
            };

            const evaluate = async (pr) => {
              if (pr.draft) throw new Error("PR is still a draft.");
              if (pr.base.ref !== context.payload.repository.default_branch) {
                throw new Error(
                  "PR base is " +
                    pr.base.ref +
                    "; expected " +
                    context.payload.repository.default_branch +
                    "."
                );
              }
              if (pr.mergeable !== true || pr.mergeable_state !== "clean") {
                throw new Error(
                  "PR merge state is not clean (mergeable=" +
                    pr.mergeable +
                    ", state=" +
                    pr.mergeable_state +
                    ")."
                );
              }

              await verifyProvenance(pr);
              const checks = await latestGitHubActionsChecks(pr.head.sha);
              const missing = REQUIRED_CHECKS.filter((name) => !checks.has(name));
              if (missing.length) {
                throw new Error("Missing required checks: " + missing.join(", "));
              }
              const blocked = REQUIRED_CHECKS.filter((name) => {
                const check = checks.get(name);
                return (
                  check.status !== "completed" ||
                  (check.conclusion || "").toLowerCase() !== "success"
                );
              });
              if (blocked.length) {
                throw new Error(
                  "Required checks did not pass: " + blocked.join(", ")
                );
              }

              if (dryRun) {
                console.log("[dry-run] PR #" + pr.number + " is eligible.");
                return false;
              }

              const mergeResponse = await github.rest.pulls.merge({
                owner,
                repo,
                pull_number: pr.number,
                commit_title: pr.title + " (#" + pr.number + ")",
                merge_method: "squash",
                expected_head_sha: pr.head.sha,
              });
              if (!mergeResponse.data.merged) {
                throw new Error(
                  "GitHub refused the merge: " +
                    (mergeResponse.data.message || "unknown reason")
                );
              }
              try {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: pr.number,
                  body: [
                    "### Dependabot Auto-Merge",
                    "Squash-merged after bot provenance, dependency-only paths, human-review state, and required GitHub Actions checks were verified.",
                    "- Required checks: " + REQUIRED_CHECKS.join(", "),
                    "",
                  ].join("\n"),
                });
              } catch (error) {
                core.warning(
                  "PR merged, but the audit comment failed: " + error.message
                );
              }
              return true;
            };

            const openPulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: "open",
              per_page: 100,
            });
            const dependabotPulls = openPulls.filter(
              (pr) => pr.user?.login?.toLowerCase() === DEPENDABOT_LOGIN
            );

            for (const candidate of dependabotPulls) {
              try {
                const response = await github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number: candidate.number,
                });
                const merged = await evaluate(response.data);
                console.log(
                  merged
                    ? "Merged PR #" + candidate.number
                    : "Dry run: PR #" + candidate.number + " would merge"
                );
              } catch (error) {
                console.log(
                  "PR #" + candidate.number + " not merged: " + error.message
                );
              }
            }
