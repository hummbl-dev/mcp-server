name = "hummbl-api"
main = "dist/api.js"
compatibility_date = "2024-01-01"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "hummbl-base120"
database_id = "622295ba-2781-42f4-9d17-45da0c7f3bb0"

# KV Namespace bindings
[[kv_namespaces]]
binding = "API_KEYS"
id = "a24da1a63cdc4459aa990d8fbf6fcf3d"

[[kv_namespaces]]
binding = "SESSIONS"
id = "0fd297ce6781450fbd687100a884241a"

# Environment variables
[vars]
ENVIRONMENT = "production"

# Custom domain configuration
[[routes]]
pattern = "api.hummbl.io/*"
zone_name = "hummbl.io"

# Secrets (set via: wrangler secret put SECRET_NAME)
# JWT_SECRET = "your-secret-key"
# REDIS_URL = "redis://..." (if needed)
